services:
  web:
    build:
      context: .
      args:
        BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
    container_name: hallmgmt-student-web
    restart: unless-stopped
    ports:
      - "${WEB_PUBLIC_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
      PORT: 3001
    networks:
      - hallnet

networks:
  hallnet:
    name: hallnet
    driver: bridge
